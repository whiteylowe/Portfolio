<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nick Lowe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050507;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
    width: 100vw;
    height: 100vh;
  }

  #canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  canvas { display: block; }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 56px;
  }

  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  #name {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    line-height: 1.8;
  }

  #role {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    text-align: right;
  }

  #bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  #project-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
  }

  #hint {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.1);
    text-align: right;
  }

  #grain {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    opacity: 0.045;
    mix-blend-mode: screen;
  }

  #loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="grain"></canvas>
  <div id="loading">Loading</div>
  <div id="ui">
    <div id="top-bar">
      <div id="name">
        Nick Lowe<br>
        <span style="color:rgba(255,255,255,0.2)">Technical Artist</span>
      </div>
      <div id="role">
        Spatial Design<br>
        XR &amp; Architecture
      </div>
    </div>
    <div id="bottom-bar">
      <div id="project-label">Campus Aperture Theater</div>
      <div id="hint">Move cursor to rotate</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const CONFIG = {
  glbPath: './assets/RayBan_Effects_2026.glb',
  lensLeft: 'Lens_L',
  lensRight: 'Lens_R',
  frame: 'Frame',

  // Per-lens media config
  // type: 'image' or 'video'
  // path: file in ./assets/
  lensMedia: {
    left: {
      type: 'image',
      path: './assets/Campus_Aperture_Theater.png'
    },
    right: {
      type: 'image',
      path: './assets/Campus_Aperture_Theater.png'
    }
  },

  // Subtle iridescence amount (0 = off, 1 = full)
  iridescenceStrength: 0.15,

  // Mouse rotation limits in degrees
  rotationX: 12,
  rotationY: 18,
};
// ──────────────────────────────────────────────────────────

let scene, camera, renderer;
let glasses, lensL, lensR;
let targetRotX = 0, targetRotY = 0;
let currentRotX = 0, currentRotY = 0;
let mouseX = 0, mouseY = 0;
let W = window.innerWidth, H = window.innerHeight;

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(38, W / H, 0.01, 100);
  camera.position.set(0, 0, 2.8);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.getElementById('canvas-container').prepend(renderer.domElement);

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const keyLight = new THREE.DirectionalLight(0xd0d8ff, 2.2);
  keyLight.position.set(-2, 3, 4);
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0xffeedd, 0.6);
  fillLight.position.set(3, -1, 2);
  scene.add(fillLight);

  const rimLight = new THREE.DirectionalLight(0x8888ff, 0.8);
  rimLight.position.set(0, -2, -3);
  scene.add(rimLight);

  loadGlasses();
  setupGrain();
  setupEvents();
  animate();
}

function loadGlasses() {
  const loader = new THREE.GLTFLoader();
  loader.load(
    CONFIG.glbPath,
    (gltf) => {
      glasses = gltf.scene;

      // Center and scale
      const box = new THREE.Box3().setFromObject(glasses);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.4 / maxDim;

      glasses.position.sub(center.multiplyScalar(scale));
      glasses.scale.setScalar(scale);

      // Correct for Blender's coordinate system -- rotate to face front
      glasses.rotation.x = -Math.PI / 2;

      // Find lens meshes
      lensL = glasses.getObjectByName(CONFIG.lensLeft);
      lensR = glasses.getObjectByName(CONFIG.lensRight);

      if (lensL) applyLensMaterial(lensL, CONFIG.lensMedia.left);
      if (lensR) applyLensMaterial(lensR, CONFIG.lensMedia.right);

      // Frame material -- dark gunmetal
      glasses.traverse((child) => {
        if (child.isMesh && child.name !== CONFIG.lensLeft && child.name !== CONFIG.lensRight) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0x111114,
            metalness: 0.92,
            roughness: 0.22,
            envMapIntensity: 1.2,
          });
        }
      });

      scene.add(glasses);
      document.getElementById('loading').style.display = 'none';
    },
    (xhr) => {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      document.getElementById('loading').textContent = `Loading ${pct}%`;
    },
    (err) => {
      console.error('GLB load error:', err);
      document.getElementById('loading').textContent = 'Error loading model';
    }
  );
}

function applyLensMaterial(mesh, mediaConfig) {
  if (mediaConfig.type === 'video') {
    const video = document.createElement('video');
    video.src = mediaConfig.path;
    video.loop = true;
    video.muted = true;
    video.playsInline = true;
    video.autoplay = true;
    video.play();

    const texture = new THREE.VideoTexture(video);
    texture.encoding = THREE.sRGBEncoding;

    mesh.material = buildLensMaterial(texture);
  } else {
    const loader = new THREE.TextureLoader();
    loader.load(mediaConfig.path, (texture) => {
      texture.encoding = THREE.sRGBEncoding;
      mesh.material = buildLensMaterial(texture);
    });
  }
}

function buildLensMaterial(texture) {
  return new THREE.MeshStandardMaterial({
    map: texture,
    transparent: true,
    opacity: 0.88,
    roughness: 0.08,
    metalness: 0.3,
    envMapIntensity: CONFIG.iridescenceStrength * 2,
    side: THREE.DoubleSide,
  });
}

// Swap lens media at runtime
// Usage: swapLens('left', { type: 'image', path: './assets/MyProject.png' })
window.swapLens = function(side, mediaConfig) {
  const mesh = side === 'left' ? lensL : lensR;
  if (!mesh) return;
  applyLensMaterial(mesh, mediaConfig);
  document.getElementById('project-label').textContent =
    mediaConfig.path.split('/').pop().replace(/\.[^/.]+$/, '').replace(/_/g, ' ');
};

function setupEvents() {
  window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / W) * 2 - 1;
    mouseY = (e.clientY / H) * 2 - 1;
  });

  window.addEventListener('resize', () => {
    W = window.innerWidth;
    H = window.innerHeight;
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    renderer.setSize(W, H);
  });
}

function animate() {
  requestAnimationFrame(animate);

  targetRotY = mouseX * (CONFIG.rotationY * Math.PI / 180);
  targetRotX = -mouseY * (CONFIG.rotationX * Math.PI / 180);

  currentRotX += (targetRotX - currentRotX) * 0.05;
  currentRotY += (targetRotY - currentRotY) * 0.05;

  if (glasses) {
    glasses.rotation.x = currentRotX;
    glasses.rotation.y = currentRotY;
  }

  renderer.render(scene, camera);
}

// Film grain canvas
function setupGrain() {
  const canvas = document.getElementById('grain');
  const ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;

  function drawGrain() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const imgData = ctx.createImageData(canvas.width, canvas.height);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      const v = Math.random() * 255;
      data[i] = data[i+1] = data[i+2] = v;
      data[i+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
    setTimeout(drawGrain, 80);
  }
  drawGrain();
}

init();
</script>
</body>
</html>
