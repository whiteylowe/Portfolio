<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<title>Nick Lowe</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#050507; overflow:hidden; font-family:'Inter',sans-serif; color:#fff; width:100vw; height:100vh; cursor:none; }

#canvas-container { position:absolute; inset:0; }

#grain { position:absolute; inset:0; pointer-events:none; opacity:0.04; mix-blend-mode:screen; }

#reticle { position:fixed; pointer-events:none; transform:translate(-50%,-50%); width:40px; height:40px; z-index:1000; }

#loading { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:10px; letter-spacing:0.3em; color:rgba(255,255,255,0.2); text-transform:uppercase; font-weight:300; z-index:500; }

.pulse-ring { position:fixed; border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); border:1px solid rgba(255,255,255,0.4); animation:pulseOut 1.2s ease-out forwards; z-index:900; }
@keyframes pulseOut { 0%{width:0;height:0;opacity:0.6} 100%{width:300px;height:300px;opacity:0} }
.pulse-ring-2 { position:fixed; border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); border:0.5px solid rgba(255,255,255,0.15); animation:pulseOut2 1.8s ease-out forwards; z-index:900; }
@keyframes pulseOut2 { 0%{width:0;height:0;opacity:0.3} 100%{width:500px;height:500px;opacity:0} }

/* ── QUANTUM GLOBE — below-right of center ── */
#globe-wrap {
  position:fixed;
  left:calc(50% + 0px);
  top:88%;
  transform:translate(-50%,-50%);
  z-index:200;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}
#globe { display:block; cursor:grab; border-radius:50%; box-shadow: 0 0 0 1px rgba(80,140,255,0.3), 0 0 20px rgba(80,140,255,0.1); transition:box-shadow 0.3s; }
#globe:hover { box-shadow: 0 0 0 1.5px rgba(80,140,255,0.55), 0 0 30px rgba(80,140,255,0.2); }
#globe:active { cursor:grabbing; }

#globe-header-ui { text-align:center; margin-bottom:8px; }
#globe-main-title { font-family:'EB Garamond',serif; font-size:33px; letter-spacing:0.28em; text-transform:uppercase; color:rgba(255,255,255,0.45); }
#globe-main-sub { font-family:'Inter',sans-serif; font-size:7px; font-weight:300; letter-spacing:0.22em; text-transform:uppercase; color:rgba(255,255,255,0.16); margin-top:3px; }
#globe-info { text-align:center; display:flex; flex-direction:column; align-items:center; gap:4px; }
#globe-title { font-family:'EB Garamond',serif; font-size:17px; color:rgba(255,255,255,0.7); letter-spacing:0.04em; transition:color 0.4s; }
#globe-phrase { font-family:'EB Garamond',serif; font-size:10px; font-style:italic; color:rgba(255,255,255,0.2); letter-spacing:0.06em; }
#globe-metrics { display:flex; gap:16px; margin-top:155px; }
.gm-col { display:flex; flex-direction:column; align-items:center; gap:2px; }
.gm-key { font-size:7px; font-weight:400; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.14); }
.gm-val { font-size:11px; font-weight:300; color:rgba(255,255,255,0.45); }
#globe-instructions { font-size:7px; font-weight:300; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.1); text-align:center; line-height:2.2; }
#globe-instructions span { color:rgba(255,255,255,0.26); }

/* ── LENS WORD OVERLAY — shown near glasses ── */
#lens-label-overlay {
  position:fixed;
  left:50%; bottom:22%;
  transform:translateX(-50%);
  z-index:300; pointer-events:none;
  text-align:center; opacity:0; transition:opacity 0.4s;
}
#lens-word { font-family:'Inter',sans-serif; font-size:9px; font-weight:400; letter-spacing:0.28em; text-transform:uppercase; color:rgba(255,255,255,0.75); transition:color 0.4s; display:block; }
#lens-subword { font-family:'Inter',sans-serif; font-size:7px; font-weight:300; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.2); display:block; margin-top:3px; }

#scan-line { position:fixed; bottom:44px; left:52px; font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.12); opacity:0; transition:opacity 0.5s; font-weight:300; z-index:300; }

#qtooltip { position:fixed; pointer-events:none; z-index:1000; font-family:'EB Garamond',serif; font-size:11px; font-style:italic; color:rgba(255,255,255,0.45); opacity:0; transition:opacity 0.2s; white-space:nowrap; }
</style>
</head>
<body>

<div id="canvas-container">
  <canvas id="grain"></canvas>
</div>

<div id="loading">Loading</div>

<svg id="reticle" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1">
    <animate attributeName="r" values="14;18;14" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.07;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="20" r="8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <line x1="20" y1="2" x2="20" y2="11" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <line x1="20" y1="29" x2="20" y2="38" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <line x1="2" y1="20" x2="11" y2="20" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <line x1="29" y1="20" x2="38" y2="20" stroke="rgba(255,255,255,0.35)" stroke-width="1"/>
  <circle cx="20" cy="20" r="1.2" fill="rgba(255,255,255,0.55)"/>
</svg>

<div id="scan-line">quantum state</div>

<div id="lens-label-overlay">
  <span id="lens-word">superposition</span>
  <span id="lens-subword">quantum state</span>
</div>

<div id="globe-header-ui"><div id="globe-main-title">Bloch Sphere</div><div id="globe-main-sub">Quantum State Space</div></div>
<div id="globe-wrap">
  <canvas id="globe" width="280" height="280"></canvas>
  <div id="globe-info">
    <div id="globe-title">|&#x3C8;&#x27E9;</div>
    <div id="globe-phrase">arbitrary qubit</div>
    <div id="globe-metrics">
      <div class="gm-col"><span class="gm-key">P(0)</span><span class="gm-val" id="mv-p0">0.500</span></div>
      <div class="gm-col"><span class="gm-key">P(1)</span><span class="gm-val" id="mv-p1">0.500</span></div>
      <div class="gm-col"><span class="gm-key">&#x3B8;</span><span class="gm-val" id="mv-theta">50&#xB0;</span></div>
      <div class="gm-col"><span class="gm-key">energy</span><span class="gm-val" id="mv-energy">&#x210F;&#x3C9;/2</span></div>
    </div>
    <div id="globe-instructions">
      <span>drag</span> to rotate &nbsp;&middot;&nbsp; <span>scroll</span> to zoom &nbsp;&middot;&nbsp; <span>click node</span> to scan &amp; lock
    </div>
  </div>
</div>

<div id="qtooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
'use strict';

// ── LAYOUT CONFIG — adjust these to reposition/rescale ──────────────
var GLOBE_OFFSET_X = 300;    // px right of screen center (negative = left)
var GLOBE_OFFSET_Y = 58;     // % from top of screen
var GLOBE_RADIUS_DEFAULT = 130; // starting radius of the 3D globe (px)
var LENS_SPHERE_RADIUS = 140;   // radius of sphere drawn inside lens texture (smaller = zoomed out)
// ────────────────────────────────────────────────────────────────────

// ════════════════════════════════════════════════════════════════════════
// QUANTUM GLOBE DATA + STATE
// ════════════════════════════════════════════════════════════════════════
var NODES = [
  {id:'|0\u27E9',theta:0,phi:0,word:'ground',phrase:'zero excitation',col:[60,210,165],energy:'0',freq:0.45,waveAmp:0.25,pStyle:'dot'},
  {id:'|1\u27E9',theta:Math.PI,phi:0,word:'excited',phrase:'maximum energy',col:[40,140,255],energy:'\u210F\u03C9',freq:0.60,waveAmp:0.28,pStyle:'ring'},
  {id:'|+\u27E9',theta:Math.PI/2,phi:0,word:'superposition',phrase:'both at once',col:[120,255,140],energy:'\u210F\u03C9/2',freq:2.4,waveAmp:0.52,pStyle:'wire'},
  {id:'|-\u27E9',theta:Math.PI/2,phi:Math.PI,word:'phase flip',phrase:'inverted amplitude',col:[255,90,70],energy:'\u210F\u03C9/2',freq:2.4,waveAmp:0.50,pStyle:'parabola'},
  {id:'|i\u27E9',theta:Math.PI/2,phi:Math.PI/2,word:'imaginary',phrase:'complex phase',col:[200,80,255],energy:'\u210F\u03C9/2',freq:1.7,waveAmp:0.44,pStyle:'cross'},
  {id:'|\u03C8\u27E9',theta:0.88,phi:2.1,word:'arbitrary',phrase:'any qubit state',col:[255,175,35],energy:'\u210F\u03C9/2',freq:1.2,waveAmp:0.38,pStyle:'spark'}
];
NODES.forEach(function(n,i){ n._phase=i*1.1; n._rings=[]; n._ringT=0; n._px=0; n._py=0; n._pz=0; });

var qRotY=0.35, qRotX=-0.22, qT=0;
var svTheta=0.88, svPhi=2.1;
var qPrecessing=true, qSelected=null;
var qDragging=false, qLmx=0, qLmy=0;
var globeRadius=GLOBE_RADIUS_DEFAULT;
var spherePulses=[], qParticles=[];

// offscreen lens canvas fed as THREE texture
var lensOffscreen=document.createElement('canvas');
lensOffscreen.width=512; lensOffscreen.height=512;
var lctx=lensOffscreen.getContext('2d');

// ── Math helpers ─────────────────────────────────────────────────────
function sph(th,ph){ return {x:Math.sin(th)*Math.cos(ph), y:Math.cos(th), z:Math.sin(th)*Math.sin(ph)}; }

function qProj(x,y,z,CX,CY,R){
  var cy=Math.cos(qRotY),sy=Math.sin(qRotY),cx=Math.cos(qRotX),sx=Math.sin(qRotX);
  var x1=cy*x+sy*z, z1=-sy*x+cy*z, y1=cx*y-sx*z1, z2=sx*y+cx*z1;
  return {x:CX+x1*R, y:CY-y1*R, z:z2};
}

function heatRGB(v){
  if(v<0.25){ var f=v/0.25; return [Math.round(20+f*40),Math.round(80+f*100),Math.round(180+f*60)]; }
  if(v<0.5){  var f=(v-0.25)/0.25; return [Math.round(60+f*140),Math.round(180+f*60),Math.round(240-f*60)]; }
  if(v<0.75){ var f=(v-0.5)/0.25; return [Math.round(200+f*55),Math.round(240-f*80),Math.round(180-f*140)]; }
  var f=(v-0.75)/0.25; return [255,Math.round(160-f*120),Math.round(40-f*30)];
}

function waveAt(u,now,amp,freq){
  var base=Math.sin(u*Math.PI*4+now*2.2)*0.42;
  var h2=Math.sin(u*Math.PI*9-now*3.7)*0.20;
  var h3=Math.sin(u*Math.PI*17+now*1.4)*0.10;
  var glitch=Math.sin(u*Math.PI*38+now*8.1)*0.15*(Math.random()<0.025?4.5:1);
  var env=Math.sin(u*Math.PI)*(0.65+0.35*Math.abs(Math.sin(u*Math.PI*2.5)));
  return (base+h2+h3+glitch)*env*(amp/0.38)*freq*0.38;
}

function wavePoint(u,now,amp,freq,org,vux,vuy,vnx,vny,vlen,wScale){
  var w=waveAt(u,now,amp,freq)*wScale;
  return {x:org.x+vux*vlen*u+vnx*w, y:org.y+vuy*vlen*u+vny*w, w:w};
}

// ── Tick ─────────────────────────────────────────────────────────────
function qTick(){
  var an=qSelected||NODES[5];
  NODES.forEach(function(n){
    n._ringT+=0.016;
    if(n._ringT>=1/n.freq){ n._ringT-=1/n.freq; n._rings.push({age:0}); }
    n._rings=n._rings.filter(function(r){ return r.age<1.5; });
    n._rings.forEach(function(r){ r.age+=0.016*n.freq*0.75; });
  });
  spherePulses=spherePulses.filter(function(p){ return p.age<1; });
  spherePulses.forEach(function(p){ p.age+=0.008; });
  if(Math.random()<0.18+an.freq*0.04){
    var speed=0.008+Math.random()*0.014+an.freq*0.003;
    qParticles.push({u:0,speed:speed,life:0,maxLife:1/speed*0.9,trail:[],col:an.col,waveAmp:an.waveAmp,freq:an.freq,pStyle:an.pStyle});
  }
  qParticles=qParticles.filter(function(p){ return p.u<=1.05&&p.life<p.maxLife; });
  qParticles.forEach(function(p){ p.u+=p.speed; p.life++; p.trail.push(p.u); if(p.trail.length>14)p.trail.shift(); });
}

// ── Sphere pulse rings ────────────────────────────────────────────────
function drawSpherePulses(ctx,CX,CY,R){
  spherePulses.forEach(function(pulse){
    var progress=pulse.age;
    var revealAngle=progress*Math.PI*1.1;
    var col=pulse.col;
    var numRings=10, bandWidth=0.18;
    for(var ri=0;ri<numRings;ri++){
      var ringAngle=revealAngle-(ri/numRings)*bandWidth*Math.PI;
      if(ringAngle<0||ringAngle>Math.PI)continue;
      var ringAlpha=Math.max(0,(1-(ri/numRings))*(1-progress*0.7)*0.55);
      if(ringAlpha<0.01)continue;
      var ov=sph(pulse.oTheta,pulse.oPhi);
      ctx.beginPath();
      var first=true;
      for(var s=0;s<=70;s++){
        var phi2=(s/70)*Math.PI*2;
        var t1x=ov.y*0-ov.z*1, t1y=ov.z*0-ov.x*0, t1z=ov.x*1-ov.y*0;
        var t1l=Math.sqrt(t1x*t1x+t1y*t1y+t1z*t1z)||1;
        t1x/=t1l; t1y/=t1l; t1z/=t1l;
        var t2x=ov.y*t1z-ov.z*t1y, t2y=ov.z*t1x-ov.x*t1z, t2z=ov.x*t1y-ov.y*t1x;
        var sinR=Math.sin(ringAngle),cosR=Math.cos(ringAngle);
        var cosPhi=Math.cos(phi2),sinPhi=Math.sin(phi2);
        var px2=cosR*ov.x+sinR*(cosPhi*t1x+sinPhi*t2x);
        var py2=cosR*ov.y+sinR*(cosPhi*t1y+sinPhi*t2y);
        var pz2=cosR*ov.z+sinR*(cosPhi*t1z+sinPhi*t2z);
        var pp=qProj(px2,py2,pz2,CX,CY,R);
        var da=pp.z>0?ringAlpha:ringAlpha*0.22;
        ctx.strokeStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+da+')';
        if(first){ ctx.moveTo(pp.x,pp.y); first=false; } else { ctx.lineTo(pp.x,pp.y); }
      }
      ctx.lineWidth=(1-ri/numRings)*1.2; ctx.stroke();
    }
    // Shimmer dots on wavefront
    for(var s=0;s<28;s++){
      var phi2=(s/28)*Math.PI*2;
      var ov2=sph(pulse.oTheta,pulse.oPhi);
      var t1x=ov2.y*0-ov2.z*1, t1y=0, t1z=ov2.x*1;
      var t1l=Math.sqrt(t1x*t1x+t1y*t1y+t1z*t1z)||1;
      t1x/=t1l; t1y/=t1l; t1z/=t1l;
      var t2x=ov2.y*t1z-ov2.z*t1y, t2y=ov2.z*t1x-ov2.x*t1z, t2z=ov2.x*t1y-ov2.y*t1x;
      var undulate=0.04*Math.sin(phi2*3+qT*8+pulse.age*12);
      var edgeA=revealAngle+undulate;
      if(edgeA<0||edgeA>Math.PI)continue;
      var sinR=Math.sin(edgeA),cosR=Math.cos(edgeA);
      var cp=Math.cos(phi2),sp=Math.sin(phi2);
      var px2=cosR*ov2.x+sinR*(cp*t1x+sp*t2x);
      var py2=cosR*ov2.y+sinR*(cp*t1y+sp*t2y);
      var pz2=cosR*ov2.z+sinR*(cp*t1z+sp*t2z);
      var pp=qProj(px2,py2,pz2,CX,CY,R);
      if(pp.z<0)continue;
      ctx.beginPath(); ctx.arc(pp.x,pp.y,2,0,Math.PI*2);
      ctx.fillStyle='rgba('+col[0]+','+col[1]+','+col[2]+','+(1-progress*0.6)*0.7+')'; ctx.fill();
    }
  });
}

// ── Core sphere drawing (shared for globe + lens) ─────────────────────
function drawSphereCore(ctx,W,H,R,showLabels){
  var CX=W/2, CY=H/2;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  var atmo=ctx.createRadialGradient(CX,CY,R*0.82,CX,CY,R*1.28);
  atmo.addColorStop(0,'rgba(60,110,255,0.06)'); atmo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(CX,CY,R*1.28,0,Math.PI*2); ctx.fillStyle=atmo; ctx.fill();

  var sf=ctx.createRadialGradient(CX-R*0.28,CY-R*0.28,R*0.04,CX,CY,R);
  sf.addColorStop(0,'rgba(14,20,36,0.97)'); sf.addColorStop(0.65,'rgba(6,10,18,0.99)'); sf.addColorStop(1,'rgba(2,4,8,1)');
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=sf; ctx.fill();

  ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.clip();
  var nb1=ctx.createRadialGradient(CX+R*0.1,CY-R*0.1,0,CX+R*0.1,CY-R*0.1,R*0.72);
  nb1.addColorStop(0,'rgba(65,50,165,'+(0.05+0.022*Math.sin(qT*0.37))+')'); nb1.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb1; ctx.fillRect(0,0,W,H);
  var nb2=ctx.createRadialGradient(CX-R*0.18,CY+R*0.22,0,CX-R*0.18,CY+R*0.22,R*0.5);
  nb2.addColorStop(0,'rgba(15,65,165,'+(0.055+0.022*Math.sin(qT*0.28+1))+')'); nb2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=nb2; ctx.fillRect(0,0,W,H);
  ctx.restore();

  // Great circles
  [0,Math.PI/2,Math.PI/3].forEach(function(tilt){
    ctx.beginPath();
    for(var j=0;j<=120;j++){
      var phi=(j/120)*Math.PI*2;
      var p={x:Math.cos(phi)*Math.cos(tilt),y:Math.sin(phi),z:Math.cos(phi)*Math.sin(tilt)};
      var pp=qProj(p.x,p.y,p.z,CX,CY,R);
      ctx.strokeStyle='rgba(100,140,255,'+(pp.z>0?0.09:0.03)+')';
      j===0?ctx.moveTo(pp.x,pp.y):ctx.lineTo(pp.x,pp.y);
    }
    ctx.lineWidth=0.5; ctx.stroke();
  });

  drawSpherePulses(ctx,CX,CY,R);

  // Nodes
  NODES.forEach(function(n){
    var p3=sph(n.theta,n.phi), pp=qProj(p3.x,p3.y,p3.z,CX,CY,R);
    if(showLabels){ n._px=pp.x; n._py=pp.y; n._pz=pp.z; }
    var front=pp.z>0, da=front?1:0.18;
    var r=n.col[0],g=n.col[1],b=n.col[2];
    n._rings.forEach(function(ring){
      var prog=ring.age/1.5, rr=50*prog;
      var wave=0.5+0.5*Math.sin(ring.age*Math.PI*2.8*n.freq*0.4);
      var a=Math.max(0,(1-prog)*0.45*wave)*da;
      if(a<0.005)return;
      ctx.beginPath(); ctx.arc(pp.x,pp.y,rr,0,Math.PI*2);
      ctx.strokeStyle='rgba('+r+','+g+','+b+','+a+')'; ctx.lineWidth=Math.max(0.3,(1-prog)*1.1); ctx.stroke();
    });
    var beat=0.7+0.3*Math.sin(qT*n.freq*Math.PI*2+n._phase);
    var cR=front?7:4;
    var bloom=ctx.createRadialGradient(pp.x,pp.y,0,pp.x,pp.y,cR*3*beat);
    bloom.addColorStop(0,'rgba('+r+','+g+','+b+','+(0.15*da)+')'); bloom.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
    ctx.beginPath(); ctx.arc(pp.x,pp.y,cR*3*beat,0,Math.PI*2); ctx.fillStyle=bloom; ctx.fill();
    ctx.beginPath(); ctx.arc(pp.x,pp.y,cR*0.65,0,Math.PI*2);
    ctx.fillStyle='rgba('+r+','+g+','+b+','+da+')'; ctx.fill();
    if(showLabels&&front){
      ctx.font="italic 11px 'EB Garamond',serif";
      ctx.fillStyle='rgba('+r+','+g+','+b+',0.6)';
      ctx.fillText(n.id,pp.x+cR+5,pp.y-2);
    }
  });

  // Waveform
  var an=qSelected||NODES[5];
  var svP3=sph(svTheta,svPhi);
  var svPr=qProj(svP3.x,svP3.y,svP3.z,CX,CY,R);
  var orgPr=qProj(0,0,0,CX,CY,R);
  var vdx=svPr.x-orgPr.x, vdy=svPr.y-orgPr.y;
  var vlen=Math.sqrt(vdx*vdx+vdy*vdy)||1;
  var vux=vdx/vlen, vuy=vdy/vlen, vnx=-vuy, vny=vux;
  var SEGS=showLabels?56:40;
  var wScale=showLabels?8.5:6;

  ctx.beginPath();
  for(var i=0;i<=SEGS;i++){
    var u=i/SEGS, w=waveAt(u,qT,an.waveAmp,an.freq)*wScale;
    var px=orgPr.x+vux*vlen*u+vnx*w, py=orgPr.y+vuy*vlen*u+vny*w;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.strokeStyle='rgba(100,140,255,0.04)'; ctx.lineWidth=showLabels?12:8; ctx.stroke();

  for(var i=0;i<SEGS;i++){
    var wp0=wavePoint(i/SEGS,qT,an.waveAmp,an.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
    var wp1=wavePoint((i+1)/SEGS,qT,an.waveAmp,an.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
    var amp=(Math.abs(wp0.w)+Math.abs(wp1.w))*0.5/wScale;
    var hc=heatRGB(Math.min(1,amp*2.5));
    ctx.beginPath(); ctx.moveTo(wp0.x,wp0.y); ctx.lineTo(wp1.x,wp1.y);
    ctx.strokeStyle='rgba('+hc[0]+','+hc[1]+','+hc[2]+','+(0.42+amp*0.58)+')';
    ctx.lineWidth=showLabels?1.8:1.2; ctx.stroke();
  }

  // Particles
  qParticles.forEach(function(p){
    if(p.u>1||p.u<0)return;
    var pr2=p.col[0],pg2=p.col[1],pb2=p.col[2];
    var wpHead=wavePoint(p.u,qT,p.waveAmp,p.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
    var style=p.pStyle||'spark';
    var trailLen=style==='wire'?8:14;
    if(style==='spark'||style==='wire'||style==='parabola'){
      for(var ti=0;ti<Math.min(p.trail.length-1,trailLen);ti++){
        var u0=p.trail[ti],u1=p.trail[ti+1];
        if(u0<0||u0>1||u1<0||u1>1)continue;
        var wp0=wavePoint(u0,qT,p.waveAmp,p.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
        var wp1=wavePoint(u1,qT,p.waveAmp,p.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
        var trailA=(ti/trailLen)*0.6;
        if(style==='wire'){
          var mx=(wp0.x+wp1.x)/2,my=(wp0.y+wp1.y)/2,dx=wp1.x-wp0.x,dy=wp1.y-wp0.y;
          var l=Math.sqrt(dx*dx+dy*dy)||1,nx2=-dy/l,ny2=dx/l,tl=5*(1-ti/trailLen);
          ctx.beginPath(); ctx.moveTo(mx+nx2*tl,my+ny2*tl); ctx.lineTo(mx-nx2*tl,my-ny2*tl);
          ctx.strokeStyle='rgba('+pr2+','+pg2+','+pb2+','+(trailA*1.2)+')'; ctx.lineWidth=1; ctx.stroke();
        } else if(style==='parabola'){
          var mx=(wp0.x+wp1.x)/2,my=(wp0.y+wp1.y)/2,jitter=(Math.random()-0.5)*6;
          ctx.beginPath(); ctx.moveTo(wp0.x,wp0.y);
          ctx.quadraticCurveTo(mx+vnx*jitter,my+vny*jitter,wp1.x,wp1.y);
          ctx.strokeStyle='rgba('+pr2+','+pg2+','+pb2+','+trailA+')'; ctx.lineWidth=1.4; ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(wp0.x,wp0.y); ctx.lineTo(wp1.x,wp1.y);
          ctx.strokeStyle='rgba('+pr2+','+pg2+','+pb2+','+trailA+')'; ctx.lineWidth=1.2; ctx.stroke();
        }
      }
    }
    if(style==='dot'){
      p.trail.forEach(function(u2,ti){
        if(u2<0||u2>1)return;
        var wp2=wavePoint(u2,qT,p.waveAmp,p.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
        ctx.beginPath(); ctx.arc(wp2.x,wp2.y,2*(ti/p.trail.length),0,Math.PI*2);
        ctx.fillStyle='rgba('+pr2+','+pg2+','+pb2+','+(ti/p.trail.length)*0.7+')'; ctx.fill();
      });
    }
    if(style==='cross'){
      p.trail.forEach(function(u2,ti){
        if(u2<0||u2>1||ti%3!==0)return;
        var wp2=wavePoint(u2,qT,p.waveAmp,p.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
        var arm=3.5*(ti/p.trail.length);
        ctx.strokeStyle='rgba('+pr2+','+pg2+','+pb2+','+(ti/p.trail.length)*0.55+')'; ctx.lineWidth=0.9;
        ctx.beginPath(); ctx.moveTo(wp2.x-arm,wp2.y); ctx.lineTo(wp2.x+arm,wp2.y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(wp2.x,wp2.y-arm); ctx.lineTo(wp2.x,wp2.y+arm); ctx.stroke();
      });
    }
    if(style==='ring'){
      p.trail.forEach(function(u2,ti){
        if(u2<0||u2>1||ti%5!==0)return;
        var wp2=wavePoint(u2,qT,p.waveAmp,p.freq,orgPr,vux,vuy,vnx,vny,vlen,wScale);
        var rr=4*(1-ti/p.trail.length)*0.7;
        ctx.beginPath(); ctx.arc(wp2.x,wp2.y,rr,0,Math.PI*2);
        ctx.strokeStyle='rgba('+pr2+','+pg2+','+pb2+','+(ti/p.trail.length)*0.4+')'; ctx.lineWidth=0.6; ctx.stroke();
      });
    }
    var pGlow=ctx.createRadialGradient(wpHead.x,wpHead.y,0,wpHead.x,wpHead.y,9);
    pGlow.addColorStop(0,'rgba('+pr2+','+pg2+','+pb2+',0.75)'); pGlow.addColorStop(1,'rgba('+pr2+','+pg2+','+pb2+',0)');
    ctx.beginPath(); ctx.arc(wpHead.x,wpHead.y,9,0,Math.PI*2); ctx.fillStyle=pGlow; ctx.fill();
    ctx.beginPath(); ctx.arc(wpHead.x,wpHead.y,1.9,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.fill();
  });

  // Tip + origin + limb + specular
  var tr=an.col[0],tg=an.col[1],tb=an.col[2];
  var tipG=ctx.createRadialGradient(svPr.x,svPr.y,0,svPr.x,svPr.y,16);
  tipG.addColorStop(0,'rgba('+tr+','+tg+','+tb+',0.55)'); tipG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(svPr.x,svPr.y,16,0,Math.PI*2); ctx.fillStyle=tipG; ctx.fill();
  ctx.beginPath(); ctx.arc(svPr.x,svPr.y,3.8,0,Math.PI*2); ctx.fillStyle='rgba('+tr+','+tg+','+tb+',1)'; ctx.fill();
  ctx.beginPath(); ctx.arc(orgPr.x,orgPr.y,2.2,0,Math.PI*2); ctx.fillStyle='rgba(80,150,255,0.6)'; ctx.fill();

  var limb=ctx.createRadialGradient(CX,CY,R*0.7,CX,CY,R);
  limb.addColorStop(0,'rgba(0,0,0,0)'); limb.addColorStop(0.78,'rgba(0,2,10,0.18)'); limb.addColorStop(1,'rgba(0,4,16,0.62)');
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.fillStyle=limb; ctx.fill();

  var spec=ctx.createRadialGradient(CX-R*0.34,CY-R*0.39,0,CX-R*0.29,CY-R*0.33,R*0.20);
  spec.addColorStop(0,'rgba(255,255,255,0.16)'); spec.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save(); ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2); ctx.clip();
  ctx.beginPath(); ctx.arc(CX-R*0.29,CY-R*0.33,R*0.20,0,Math.PI*2); ctx.fillStyle=spec; ctx.fill();
  ctx.restore();
  ctx.beginPath(); ctx.arc(CX,CY,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(100,140,220,0.11)'; ctx.lineWidth=1; ctx.stroke();
}

function updateGlobeText(node){
  var p0=(Math.cos(node.theta/2)*Math.cos(node.theta/2)).toFixed(3);
  var p1=(Math.sin(node.theta/2)*Math.sin(node.theta/2)).toFixed(3);
  var r=node.col[0],g=node.col[1],b=node.col[2];
  qSet('globe-title',node.id);
  qSet('globe-title','rgba('+r+','+g+','+b+',0.85)','color');
  qSet('globe-phrase',node.phrase);
  qSet('mv-p0',p0); qSet('mv-p1',p1);
  qSet('mv-theta',Math.round(node.theta*180/Math.PI)+'\xb0');
  qSet('mv-energy',node.energy);
  qSet('lens-word',node.word);
  qSet('lens-word','rgba('+r+','+g+','+b+',0.9)','color');
  qSet('lens-subword',node.phrase);
  qSet('scan-line',node.word+' \u00B7 '+node.phrase);
}
function resetGlobeText(){
  qSet('globe-title','|\u03C8\u27E9');

  qSet('lens-word','superposition');
  qSet('lens-word','rgba(255,255,255,0.75)','color');
  qSet('lens-subword','quantum state');
  qSet('scan-line','quantum state');
}

var CONFIG={ glbPath:'./assets/RayBan_Effects_2026.glb', lensLeft:'Lens_L', lensRight:'Lens_R', rotationX:10, rotationY:16, parallaxStrength:0.06 };
var scene,camera,renderer,glasses,lensL,lensR,lensTexture3;
var targetRotX=0,targetRotY=0,currentRotX=0,currentRotY=0;
var W=window.innerWidth,H=window.innerHeight;
var parallaxX=0,parallaxY=0,targetParallaxX=0,targetParallaxY=0;

function init(){
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(38,W/H,0.01,100);
  camera.position.set(0,0,2.8);
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  document.getElementById('canvas-container').prepend(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff,0.4));
  var kl=new THREE.DirectionalLight(0xd0d8ff,2.2); kl.position.set(-2,3,4); scene.add(kl);
  var fl=new THREE.DirectionalLight(0xffeedd,0.6); fl.position.set(3,-1,2); scene.add(fl);
  var rl=new THREE.DirectionalLight(0x8888ff,0.8); rl.position.set(0,-2,-3); scene.add(rl);

  // Particles
  var sc2=document.createElement('canvas'); sc2.width=64; sc2.height=64;

  sCtx.fillStyle=grad; sCtx.fillRect(0,0,64,64);
  var sprite=new THREE.CanvasTexture(sc2);
  var pCount=400,pos=new Float32Array(pCount*3),base=new Float32Array(pCount*3);
  for(var i=0;i<pCount;i++){
    var x=(Math.random()-0.5)*8,y=(Math.random()-0.5)*5,z=(Math.random()-0.5)*3-0.5;
    pos[i*3]=base[i*3]=x; pos[i*3+1]=base[i*3+1]=y; pos[i*3+2]=base[i*3+2]=z;
  }
  var pGeo=new THREE.BufferGeometry();
  pGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  var pMat=new THREE.PointsMaterial({color:0xaabbdd,size:0.029,transparent:true,opacity:0.3,depthWrite:false,sizeAttenuation:true,map:sprite,alphaMap:sprite,alphaTest:0.01});
  window._pts=new THREE.Points(pGeo,pMat);
  window._ptPos=pos; window._ptBase=base;
  window._pulseOrigin=null; window._pulseTime=0;
  scene.add(window._pts);

  // Lens texture from offscreen canvas
  lensTexture3=new THREE.CanvasTexture(lensOffscreen);
  lensTexture3.flipY=false;

  loadGlasses();
  setupGrain();
  setupEvents();
  animate();
}

function applyLensMat(mesh){
  if(!mesh)return;
  mesh.material=new THREE.MeshStandardMaterial({map:lensTexture3,transparent:true,opacity:1.0,roughness:0.05,metalness:0.2,side:THREE.FrontSide,blending:THREE.AdditiveBlending,depthWrite:false});
}

function loadGlasses(){
  var loader=new THREE.GLTFLoader();
  loader.load(CONFIG.glbPath,function(gltf){
    glasses=gltf.scene;
    var box=new THREE.Box3().setFromObject(glasses);
    var center=box.getCenter(new THREE.Vector3());
    var size=box.getSize(new THREE.Vector3());
    var scale=1.4/Math.max(size.x,size.y,size.z);
    glasses.position.sub(center.multiplyScalar(scale));
    glasses.scale.setScalar(scale);
    scene.add(glasses);

    lensL=glasses.getObjectByName(CONFIG.lensLeft);
    lensR=glasses.getObjectByName(CONFIG.lensRight);
    window._camPulseL=glasses.getObjectByName('Frame_Camera_Left_Pulse');
    window._camPulseR=glasses.getObjectByName('Frame_Camera_Right_Pulse');
    window._shutterTime=0;

    applyLensMat(lensL);
    applyLensMat(lensR);

    glasses.traverse(function(child){
      if(child.isMesh&&child.name!==CONFIG.lensLeft&&child.name!==CONFIG.lensRight&&child.name!=='Frame_Camera_Left'&&child.name!=='Frame_Camera_Right'&&child.name!=='Frame_Camera_Left_Pulse'&&child.name!=='Frame_Camera_Right_Pulse'){
        child.material=new THREE.MeshStandardMaterial({color:0x111114,metalness:0.92,roughness:0.22,transparent:true,opacity:0.85});
      }
    });
    ['Frame_Camera_Left','Frame_Camera_Right'].forEach(function(nm){
      var m=glasses.getObjectByName(nm);
      if(m)m.material=new THREE.MeshStandardMaterial({color:0x0a0a0d,metalness:0.95,roughness:0.18,transparent:true,opacity:0.85});
    });
    ['Frame_Camera_Left_Pulse','Frame_Camera_Right_Pulse'].forEach(function(nm){
      var m=glasses.getObjectByName(nm);
      if(m)m.material=new THREE.MeshStandardMaterial({color:new THREE.Color(0x000000),emissive:new THREE.Color(0x00ccff),emissiveIntensity:0,transparent:true,opacity:1.0});
    });
    ['Lens_Glass_L','Lens_Glass_R'].forEach(function(nm){
      var m=glasses.getObjectByName(nm);
      if(m)m.material=new THREE.MeshStandardMaterial({color:new THREE.Color(0x88aacc),transparent:true,opacity:0.07,roughness:0.02,metalness:0.9,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
    });
    window._glassL=glasses.getObjectByName('Lens_Glass_L');
    window._glassR=glasses.getObjectByName('Lens_Glass_R');

    // Lens rings
    var ringMat=new THREE.MeshBasicMaterial({color:0x44aaff,transparent:true,opacity:0.35,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending});
    var rGO=new THREE.RingGeometry(0.055,0.06,64);
    var rGI=new THREE.RingGeometry(0.022,0.025,64);
    [[0.38,-0.107,0.43],[-0.46,-0.107,0.43]].forEach(function(pos2){
      var ro=new THREE.Mesh(rGO.clone(),ringMat.clone());
      var ri=new THREE.Mesh(rGI.clone(),ringMat.clone());
      ro.position.set(pos2[0],pos2[1],pos2[2]); ri.position.set(pos2[0],pos2[1],pos2[2]);
      glasses.add(ro); glasses.add(ri);
      if(!window._rings)window._rings=[];
      window._rings.push(ro,ri);
    });

    var llo=document.getElementById('lens-label-overlay');
    if(llo)llo.style.opacity='1';
    document.getElementById('loading').style.display='none';
    document.getElementById('scan-line').style.opacity='1';

  },function(xhr){
    document.getElementById('loading').textContent='Loading '+Math.round(xhr.loaded/xhr.total*100)+'%';
  },function(err){
    console.error(err); document.getElementById('loading').textContent='Error';
  });
}

function spawnPulse(x,y){
  var r1=document.createElement('div'); r1.className='pulse-ring'; r1.style.left=x+'px'; r1.style.top=y+'px'; document.body.appendChild(r1); setTimeout(function(){r1.remove();},1200);
  var r2=document.createElement('div'); r2.className='pulse-ring-2'; r2.style.left=x+'px'; r2.style.top=y+'px'; document.body.appendChild(r2); setTimeout(function(){r2.remove();},1800);
}

function setupEvents(){
  var reticle=document.getElementById('reticle');
  window.addEventListener('mousemove',function(e){
    reticle.style.left=e.clientX+'px'; reticle.style.top=e.clientY+'px';
    var nx=(e.clientX/W)*2-1, ny=(e.clientY/H)*2-1;
    targetRotY=-nx*(CONFIG.rotationY*Math.PI/180);
    targetRotX=ny*(CONFIG.rotationX*Math.PI/180);
    targetParallaxX=nx*CONFIG.parallaxStrength;
    targetParallaxY=-ny*CONFIG.parallaxStrength;
  });

  window.addEventListener('click',function(e){
    var globeEl=document.getElementById('globe');
    var gr=globeEl.getBoundingClientRect();
    var onGlobe=e.clientX>=gr.left&&e.clientX<=gr.right&&e.clientY>=gr.top&&e.clientY<=gr.bottom;
    if(!onGlobe){ spawnPulse(e.clientX,e.clientY); window._pulseTime=Date.now(); window._shutterTime=Date.now(); }
  });

  window.addEventListener('resize',function(){
    W=window.innerWidth; H=window.innerHeight;
    camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H);
  });

  // Globe drag
  var globeEl=document.getElementById('globe');
  globeEl.addEventListener('mousedown',function(e){ qDragging=true; qLmx=e.clientX; qLmy=e.clientY; e.stopPropagation(); });
  window.addEventListener('mouseup',function(){ qDragging=false; });
  window.addEventListener('mousemove',function(e){
    if(!qDragging)return;
    qRotY+=(e.clientX-qLmx)*0.009; qRotX-=(e.clientY-qLmy)*0.009;
    qLmx=e.clientX; qLmy=e.clientY;
  });

  // Scroll zoom on globe
  globeEl.addEventListener('wheel',function(e){
    e.preventDefault();
    globeRadius=Math.max(55,Math.min(240,globeRadius-e.deltaY*0.25));
    var size=Math.round(globeRadius*2.3);
    globeEl.width=size; globeEl.height=size;
  },{passive:false});

  // Globe hit + click
  var qtt=document.getElementById('qtooltip');
  globeEl.addEventListener('mousemove',function(e){
    if(qDragging){ if(qtt)qtt.style.opacity='0'; globeEl.style.cursor='grabbing'; return; }
    var rect=globeEl.getBoundingClientRect();
    var mx=e.clientX-rect.left, my=e.clientY-rect.top;
    var hit=qHitTest(mx,my,globeEl);
    if(hit){
      globeEl.style.cursor='pointer';
      if(qtt){ qtt.style.opacity='1'; qtt.style.left=(e.clientX+14)+'px'; qtt.style.top=(e.clientY-8)+'px'; qtt.textContent=hit.word; }
    } else {
      globeEl.style.cursor='grab';
      if(qtt)qtt.style.opacity='0';
    }
  });
  globeEl.addEventListener('mouseleave',function(){ if(qtt)qtt.style.opacity='0'; });

  globeEl.addEventListener('click',function(e){
    e.stopPropagation();
    if(qDragging)return;
    var rect=globeEl.getBoundingClientRect();
    var mx=e.clientX-rect.left, my=e.clientY-rect.top;
    var hit=qHitTest(mx,my,globeEl);
    if(hit){
      qSelected=hit; qPrecessing=false;
      svTheta=hit.theta; svPhi=hit.phi;
      updateGlobeText(hit);
      for(var i=0;i<3;i++)(function(ii){ setTimeout(function(){ spherePulses.push({age:0,oTheta:hit.theta,oPhi:hit.phi,col:hit.col}); },ii*280); })(i);
      qParticles=[];
      window._shutterTime=Date.now();
    } else {
      qSelected=null; qPrecessing=true;
      resetGlobeText();
      var nx2=(mx/globeEl.width)*2-1, ny2=-((my/globeEl.height)*2-1);
      spherePulses.push({age:0,oTheta:Math.acos(Math.max(-1,Math.min(1,ny2))),oPhi:Math.atan2(0,nx2),col:[100,140,255]});
      qParticles=[];
    }
  });
}

function qHitTest(mx,my,globeEl){
  var scaleX=globeEl.width/globeEl.offsetWidth, scaleY=globeEl.height/globeEl.offsetHeight;
  var cmx=mx*scaleX, cmy=my*scaleY;
  var best=null, bestD=30*(scaleX||1);
  NODES.forEach(function(n){
    var d=Math.sqrt((cmx-n._px)*(cmx-n._px)+(cmy-n._py)*(cmy-n._py));
    if(d<bestD&&n._pz>0){ bestD=d; best=n; }
  });
  return best;
}

function animate(){
  requestAnimationFrame(animate);
  qT+=0.014; qTick();
  if(qPrecessing){ svPhi+=0.005; svTheta=Math.PI/3+0.18*Math.sin(qT*0.28); }

  // Draw globe
  var gc=document.getElementById('globe');
  drawSphereCore(gc.getContext('2d'),gc.width,gc.height,globeRadius,true);

  // Draw + update lens texture
  drawLensTexture();
  if(lensTexture3)lensTexture3.needsUpdate=true;

  // Star particles
  if(window._pts){
    window._pts.rotation.y+=0.0003; window._pts.rotation.x+=0.0001;
    var pos2=window._ptPos, base2=window._ptBase;
    var tt=Date.now()*0.0003;
    var pAge=Date.now()-(window._pulseTime||0);
    var pRad=pAge*0.004, pStr=Math.max(0,1-pAge/1200);
    for(var i=0;i<pos2.length;i+=3){
      pos2[i+1]=base2[i+1]+Math.sin(tt+i)*0.04;
      pos2[i]=base2[i]+Math.cos(tt+i*0.7)*0.02;
      if(window._pulseOrigin&&pStr>0){
        var dx=pos2[i]-window._pulseOrigin.x, dy=pos2[i+1]-window._pulseOrigin.y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        var wave=Math.max(0,1-Math.abs(dist-pRad)/0.8)*pStr;
        var angle=Math.atan2(dy,dx);
        pos2[i]+=Math.cos(angle)*wave*0.12; pos2[i+1]+=Math.sin(angle)*wave*0.12;
      }
    }
    window._pts.geometry.attributes.position.needsUpdate=true;
  }

  // Camera emissive pulse
  if(window._camPulseL&&window._camPulseR){
    var age=Date.now()-(window._shutterTime||0);
    var p1=age<120?age/120:Math.max(0,1-(age-120)/200);
    var p2=age>350&&age<470?(age-350)/120:age>470?Math.max(0,1-(age-470)/300):0;
    var intensity=Math.max(p1,p2)*2.5;
    window._camPulseL.material.emissiveIntensity=intensity;
    window._camPulseR.material.emissiveIntensity=intensity;
  }

  // Lens rings
  if(window._rings){
    var tt2=Date.now()*0.002;
    var pulse=0.85+Math.sin(tt2)*0.15;
    var cAge=Date.now()-(window._shutterTime||0);
    var cPulse=cAge<800?Math.max(0,1-cAge/800)*0.8:0;
    window._rings.forEach(function(r,i){ r.material.opacity=(i%2===0?0.35:0.2)*pulse+cPulse; r.scale.setScalar((i%2===0?pulse:1+(1-pulse)*0.3)*0.275); });
  }

  // Glass shimmer
  if(window._glassL&&window._glassR){
    var tt3=Date.now()*0.0004;
    var shift=Math.sin(tt3)*0.03+0.07;
    window._glassL.material.opacity=shift; window._glassR.material.opacity=shift;
  }

  currentRotX+=(targetRotX-currentRotX)*0.05;
  currentRotY+=(targetRotY-currentRotY)*0.05;
  parallaxX+=(targetParallaxX-parallaxX)*0.04;
  parallaxY+=(targetParallaxY-parallaxY)*0.04;
  if(glasses){ glasses.rotation.x=currentRotX; glasses.rotation.y=-currentRotY; }

  renderer.render(scene,camera);
}

function setupGrain(){
  var canvas=document.getElementById('grain');
  var ctx=canvas.getContext('2d');
  function drawGrain(){
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    var imgData=ctx.createImageData(canvas.width,canvas.height);
    var data=imgData.data;
    for(var i=0;i<data.length;i+=4){ var v=Math.random()*255; data[i]=data[i+1]=data[i+2]=v; data[i+3]=255; }
    ctx.putImageData(imgData,0,0);
    setTimeout(drawGrain,80);
  }
  drawGrain();
}

init();

</script>
